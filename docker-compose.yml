version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: loyalty_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: loyalty_db
      MYSQL_USER: loyalty_user
      MYSQL_PASSWORD: loyalty_pass
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loyalty_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql://loyalty_user:loyalty_pass@mysql:3306/loyalty_db
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRES_IN: 7d
      PORT: 5556
      NODE_ENV: development
    ports:
      - '5556:5556'
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: loyalty_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:5556/api
    ports:
      - '3000:3000'
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mysql_data: